services:
  # ──────────────────────────────────────────────────────────────────
  # PostgreSQL (production DB — switch DATABASE_URL in .env)
  # ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chronos_user
      POSTGRES_PASSWORD: chronos_pass
      POSTGRES_DB: chronosintel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos_user -d chronosintel"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────
  # ChronosIntel Backend API
  # ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    command: >
      sh -c "uvicorn app.main:app
             --host 0.0.0.0
             --port 8000
             --reload
             --log-level info"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use PostgreSQL service
      # Comment out to use SQLite (dev default from .env)
      DATABASE_URL: postgresql+asyncpg://chronos_user:chronos_pass@db:5432/chronosintel
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app           # Live code reload in dev
      - ./ai:/ai                 # AI module access
      - ./storage:/storage       # Persistent file storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────
  # Frontend (placeholder — replace with actual frontend config)
  # ──────────────────────────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
