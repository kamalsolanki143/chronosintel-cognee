[pytest]
# Run tests from the project root: pytest tests/
asyncio_mode = auto
testpaths = tests

# Add these directories to sys.path so `app.*` and `ai.*` imports work.
# Requires pytest >= 7.0
pythonpath =
    backend
    .

python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
